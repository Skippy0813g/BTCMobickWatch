# 재현빌드용 Rust 툴체인 고정 (R2-a).
# 'stable'은 6주마다 최신 버전으로 떠내려가므로, 누가 언제 빌드해도
# 동일 결과가 나오도록 컴파일러 버전을 못박는다. 현재 배포 빌드 기준 1.96.0.
[toolchain]
channel = "1.96.0"
targets = [
    "aarch64-linux-android",   # arm64-v8a (실기기 주력)
    "armv7-linux-androideabi", # armeabi-v7a (구형)
    "x86_64-linux-android",    # 에뮬레이터
]
